<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM 模拟器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0c14;
    --bg2: #111420;
    --bg3: #181c2e;
    --panel: #1a1e30;
    --panel2: #1f2438;
    --border: rgba(120,140,255,0.15);
    --border2: rgba(120,140,255,0.28);
    --accent: #7c6fff;
    --accent2: #b39aff;
    --gold: #e6b84a;
    --gold2: #ffd97a;
    --red: #e05252;
    --red2: #ff8585;
    --green: #4caf7a;
    --green2: #80d4a8;
    --text: #e8e6f0;
    --text2: #9b97b8;
    --text3: #6b6887;
    --system: #4a9e8a;
    --system2: #7dd4c0;
    --warn: #e09a3a;
    --warn2: #f5c77a;
    --shadow: 0 4px 32px rgba(0,0,0,0.6);
    --glow: 0 0 20px rgba(124,111,255,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.75;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
  }

  .game-wrap {
    width: 100%; max-width: 780px;
    padding: 2rem 1rem 4rem;
    position: relative; z-index: 1;
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding: 2rem 1.5rem 1.5rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--panel);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--gold), var(--accent), transparent);
  }
  .header-corner {
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.5;
  }
  .header-corner.tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
  .header-corner.tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
  .header-corner.bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
  .header-corner.br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

  .system-tag {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--system2); margin-bottom: 0.5rem;
    font-family: 'Noto Serif SC', serif;
  }
  .game-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 2rem; font-weight: 700;
    color: var(--gold2);
    letter-spacing: 0.1em;
    text-shadow: 0 0 30px rgba(230,184,74,0.3);
    margin-bottom: 0.4rem;
  }
  .game-subtitle {
    font-size: 12px; color: var(--text3);
    letter-spacing: 1px;
  }

  /* ===== PLAYER STATS BAR ===== */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .stat-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .stat-label { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
  .stat-value { font-size: 14px; font-weight: 500; color: var(--gold2); font-family: 'Noto Serif SC', serif; }
  .stat-value.bad { color: var(--red2); }
  .stat-value.warn { color: var(--warn2); }

  /* ===== SKILLS PANEL ===== */
  .skills-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
  }
  .skills-header {
    font-size: 11px; letter-spacing: 2px; color: var(--accent2);
    text-transform: uppercase; margin-bottom: 0.75rem;
    display: flex; align-items: center; gap: 8px;
  }
  .skills-header::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .skills-grid {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .skill-badge {
    font-size: 11px; padding: 3px 10px;
    border: 1px solid var(--border2);
    border-radius: 2px;
    color: var(--accent2);
    background: rgba(124,111,255,0.08);
    cursor: default;
    transition: all 0.2s;
    user-select: none;
  }
  .skill-badge:hover {
    background: rgba(124,111,255,0.18);
    border-color: var(--accent);
  }
  .skill-badge.unlocked {
    color: var(--gold2);
    border-color: rgba(230,184,74,0.4);
    background: rgba(230,184,74,0.07);
  }

  /* ===== MAIN SCENE ===== */
  .scene-container {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 1.5rem;
    position: relative;
  }

  .scene-header {
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .scene-chapter {
    font-size: 10px; letter-spacing: 2px; color: var(--text3);
    text-transform: uppercase;
  }
  .scene-title {
    font-size: 13px; color: var(--accent2); font-weight: 500;
  }
  .scene-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .scene-body { padding: 1.5rem 1.5rem 1.25rem; }

  .narrator-text {
    color: var(--text);
    font-size: 14.5px;
    line-height: 1.85;
    margin-bottom: 1rem;
  }
  .narrator-text .npc-name {
    color: var(--gold2);
    font-weight: 500;
  }
  .narrator-text .player-name {
    color: var(--accent2);
    font-weight: 500;
  }

  /* ===== BUFF BANNER ===== */
  .buff-banner {
    background: rgba(224,82,82,0.08);
    border: 1px solid rgba(224,82,82,0.25);
    border-radius: 4px;
    padding: 0.75rem 1rem;
    margin: 1rem 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .buff-name {
    font-size: 13px; font-weight: 700;
    color: var(--red2); letter-spacing: 1px;
    font-family: 'Noto Serif SC', serif;
  }
  .buff-desc { font-size: 12px; color: var(--text2); }

  /* ===== SYSTEM LOGS ===== */
  .system-log-toggle {
    font-size: 11px; color: var(--system2);
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    padding: 6px 0;
    user-select: none;
    letter-spacing: 0.5px;
  }
  .system-log-toggle .arrow { transition: transform 0.25s; display: inline-block; }
  .system-log-toggle.open .arrow { transform: rotate(90deg); }

  .system-logs {
    background: rgba(10,12,20,0.6);
    border: 1px solid rgba(74,158,138,0.2);
    border-radius: 4px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s ease;
  }
  .system-logs.visible { max-height: 600px; }

  .log-line {
    display: flex; gap: 8px;
    padding: 5px 12px;
    border-bottom: 1px solid rgba(74,158,138,0.08);
    font-size: 12px;
    color: var(--text2);
    font-family: 'Noto Serif SC', serif;
  }
  .log-line:last-child { border-bottom: none; }
  .log-slash { color: var(--system2); flex-shrink: 0; font-weight: 700; }
  .log-skill { color: var(--system2); font-weight: 500; flex-shrink: 0; }
  .log-text { color: var(--text3); font-size: 11.5px; }

  /* ===== CHOICE PANEL ===== */
  .choice-panel {
    padding: 1.25rem 1.5rem;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }
  .choice-label {
    font-size: 11px; letter-spacing: 2px; color: var(--text3);
    text-transform: uppercase; margin-bottom: 0.75rem;
  }
  .choices { display: flex; flex-direction: column; gap: 8px; }

  .choice-btn {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    cursor: pointer;
    display: flex; align-items: flex-start; gap: 12px;
    transition: all 0.2s;
    text-align: left;
    font-family: inherit;
    color: var(--text);
    width: 100%;
  }
  .choice-btn:hover {
    background: rgba(124,111,255,0.1);
    border-color: var(--accent);
    transform: translateX(3px);
  }
  .choice-btn:active { transform: translateX(1px) scale(0.99); }
  .choice-btn.selected-a {
    border-color: var(--green);
    background: rgba(76,175,122,0.1);
  }
  .choice-btn.selected-b {
    border-color: var(--red);
    background: rgba(224,82,82,0.1);
    animation: flash-red 0.4s ease;
  }
  @keyframes flash-red {
    0% { background: rgba(224,82,82,0.25); }
    100% { background: rgba(224,82,82,0.1); }
  }
  .choice-btn:disabled {
    cursor: default; transform: none;
    opacity: 0.6;
  }
  .choice-key {
    font-size: 11px; font-weight: 700;
    width: 22px; height: 22px;
    border: 1px solid var(--border2);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--accent2);
    margin-top: 1px;
  }
  .choice-key.key-a { color: var(--green2); border-color: rgba(76,175,122,0.4); }
  .choice-key.key-b { color: var(--red2); border-color: rgba(224,82,82,0.4); }
  .choice-text { font-size: 13.5px; line-height: 1.6; }

  /* ===== RESULT PANEL ===== */
  .result-panel {
    padding: 1rem 1.5rem;
    background: rgba(0,0,0,0.3);
    border-top: 1px solid var(--border);
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .result-panel.visible { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-good {
    color: var(--green2);
    font-size: 13px; padding: 8px 0;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .result-bad {
    color: var(--red2);
    font-size: 13px; padding: 8px 0;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .result-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .result-next-btn {
    margin-top: 12px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 8px 20px;
    color: var(--accent2);
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .result-next-btn:hover {
    background: rgba(124,111,255,0.1);
    border-color: var(--accent);
  }
  .result-next-btn .arrow { transition: transform 0.2s; }
  .result-next-btn:hover .arrow { transform: translateX(3px); }

  /* ===== PROGRESS ===== */
  .progress-bar-wrap {
    margin-bottom: 1.5rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-label { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .progress-track {
    flex: 1; height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    transition: width 0.5s ease;
  }
  .progress-count { font-size: 11px; color: var(--text3); white-space: nowrap; }

  /* ===== ENDING ===== */
  .ending-screen {
    display: none;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .ending-screen.visible { display: block; }
  .ending-screen::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--red), var(--gold), var(--red), transparent);
  }
  .ending-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.6rem; color: var(--gold2);
    margin-bottom: 1rem; letter-spacing: 0.1em;
  }
  .ending-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin: 1.5rem 0;
  }
  .e-stat {
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 4px; padding: 12px 8px;
  }
  .e-stat-n { font-size: 1.4rem; font-weight: 700; color: var(--gold2); }
  .e-stat-l { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .ending-desc {
    font-size: 13.5px; color: var(--text2);
    line-height: 1.8; margin-bottom: 1.5rem;
    text-align: left;
  }
  .restart-btn {
    background: rgba(124,111,255,0.1);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 10px 28px;
    color: var(--accent2);
    font-family: 'Noto Serif SC', serif;
    font-size: 14px; letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .restart-btn:hover { background: rgba(124,111,255,0.2); }

  /* ===== SCROLL REVEAL ===== */
  .scene-container.hidden { display: none; }

</style>
</head>
<body>
<div class="scanlines"></div>
<div class="game-wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-corner tl"></div>
    <div class="header-corner tr"></div>
    <div class="header-corner bl"></div>
    <div class="header-corner br"></div>
    <div style="display:flex; align-items:center; gap:1.25rem;">
      <div style="position:relative; flex-shrink:0;">
        <div style="width:80px; height:80px; border-radius:4px; overflow:hidden; border:1px solid rgba(230,184,74,0.4); box-shadow:0 0 16px rgba(124,111,255,0.25);">
          <img src="https://cdn.ymgal.games/archive/main/2d/2d2e871541a5491abd4f76052d54a8c8.jpg"
               alt="DM ■■"
               style="width:100%; height:100%; object-fit:cover; object-position:center top; display:block;"
               onerror="this.parentElement.innerHTML='<div style=\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--panel2);font-size:28px;\'>■■</div>'" />
        </div>
        <div style="position:absolute; bottom:-4px; right:-4px; background:var(--accent); border-radius:2px; font-size:9px; padding:2px 5px; letter-spacing:1px; color:#fff; font-weight:500;">DM</div>
      </div>
      <div style="text-align:left; flex:1;">
        <div class="system-tag" style="text-align:left;">// SYSTEM INITIALIZED //</div>
        <div class="game-title" style="font-size:1.6rem;">DM 模拟器</div>
        <div class="game-subtitle">宿主，欢迎进入以 ■■■■ 为蓝本的模拟器</div>
      </div>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item" style="flex-direction:row; align-items:center; gap:8px; justify-content:center;">
      <img src="https://cdn.ymgal.games/archive/main/2d/2d2e871541a5491abd4f76052d54a8c8.jpg"
           style="width:28px; height:28px; border-radius:3px; object-fit:cover; object-position:center top; border:1px solid rgba(230,184,74,0.35);"
           onerror="this.style.display='none'" />
      <div>
        <div class="stat-label">身份</div>
        <div class="stat-value">DM ■■</div>
      </div>
    </div>
    <div class="stat-item">
      <div class="stat-label">道德值</div>
      <div class="stat-value" id="moral-val">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">当前关卡</div>
      <div class="stat-value" id="stage-val">第 1 关</div>
    </div>
  </div>

  <!-- Skills Panel -->
  <div class="skills-panel">
    <div class="skills-header">新手技能包</div>
    <div class="skills-grid" id="skills-grid">
      <span class="skill-badge" data-skill="0">喊我小弟弄你</span>
      <span class="skill-badge" data-skill="1">找我老大弄你</span>
      <span class="skill-badge" data-skill="2">无中生有</span>
      <span class="skill-badge" data-skill="3">移花接木</span>
      <span class="skill-badge" data-skill="4">碰到难回答的问题就不说话了</span>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-bar-wrap">
    <span class="progress-label">游戏进度</span>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
    <span class="progress-count" id="progress-count">0 / 7</span>
  </div>

  <!-- Scenes will be injected here -->
  <div id="scenes-container"></div>

  <!-- Ending Screen -->
  <div class="ending-screen" id="ending-screen">
    <div class="header-corner tl"></div>
    <div class="header-corner tr"></div>
    <div class="header-corner bl"></div>
    <div class="header-corner br"></div>
    <div class="ending-title" id="end-title">通关</div>
    <div class="ending-stats">
      <div class="e-stat">
        <div class="e-stat-n" id="end-choices">7</div>
        <div class="e-stat-l">总选择次数</div>
      </div>
      <div class="e-stat">
        <div class="e-stat-n" id="end-b-count">-</div>
        <div class="e-stat-l">选了 B 的次数</div>
      </div>
      <div class="e-stat">
        <div class="e-stat-n" id="end-moral">0</div>
        <div class="e-stat-l">最终道德值</div>
      </div>
    </div>
    <div class="ending-desc" id="end-desc"></div>
    <div id="end-achievements" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:1.5rem;"></div>
    <button class="restart-btn" onclick="restartGame()">▶ 重新游玩</button>
  </div>

  <!-- System Alert Overlay -->
  <div id="system-alert" style="display:none; position:fixed; inset:0; z-index:999; background:rgba(0,0,0,0.85); align-items:center; justify-content:center;">
    <div style="max-width:420px; width:90%; background:var(--panel); border:1px solid var(--red); border-radius:4px; overflow:hidden; position:relative;">
      <div style="height:3px; background:linear-gradient(90deg,var(--red),#ff4444,var(--red));"></div>
      <div style="padding:1.5rem;">
        <div style="font-size:10px;letter-spacing:3px;color:var(--red2);margin-bottom:0.5rem;">WARNING // SYSTEM ALERT</div>
        <div style="font-family:'Noto Serif SC',serif;font-size:1.1rem;color:var(--red2);font-weight:700;margin-bottom:0.75rem;" id="alert-title">检测到异常道德波动</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:1rem;" id="alert-body"></div>
        <div style="background:rgba(224,82,82,0.08);border:1px solid rgba(224,82,82,0.2);border-radius:4px;padding:0.6rem 0.8rem;font-size:12px;color:var(--red2);margin-bottom:1.25rem;" id="alert-moral-bar"></div>
        <div style="display:flex;gap:8px;">
          <button style="flex:1;background:transparent;border:1px solid var(--border2);border-radius:4px;padding:9px;color:var(--accent2);font-family:inherit;font-size:13px;cursor:pointer;" onclick="cancelAlert()">收手，重新选择</button>
          <button style="flex:1;background:rgba(224,82,82,0.1);border:1px solid var(--red);border-radius:4px;padding:9px;color:var(--red2);font-family:inherit;font-size:13px;cursor:pointer;" onclick="confirmAlert()">无视警告，坚持选 A</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Annihilation Overlay -->
  <div id="annihilation-overlay" style="display:none;position:fixed;inset:0;z-index:1000;background:#000;align-items:center;justify-content:center;flex-direction:column;gap:1rem;">
    <div style="font-family:'Noto Serif SC',serif;font-size:1.8rem;color:var(--red2);letter-spacing:0.2em;text-align:center;" id="annihilation-text">宿主已被系统抹杀</div>
    <div style="font-size:13px;color:var(--text3);letter-spacing:2px;">正在强制回档……</div>
  </div>

</div>

<script>
const SCENES = [

const ANNIHILATION_THRESHOLD = 60;

const ANNIHILATION_MSGS = [
  "道德值过载，宿主人设崩塌——系统已将您强制回档",
  "检测到异常良知活动，紧急抹杀程序已启动",
  "宿主过于正直，无法继续担任本角色——强制重置中",
  "系统警告：您的善意正在污染模拟数据——已撤销本次选择",
  "道德值爆表，宿主已不适合扮演此角色——回档至上一存档点"
];

let currentScene = 0;
let bCount = 0;
let totalMoral = 0;
let annihilationCount = 0;
let pendingChoiceIdx = -1;
let pendingKey = '';

function buildScene(index) {
  const scene = SCENES[index];
  const wrap = document.createElement('div');
  wrap.className = 'scene-container';
  wrap.id = `scene-${index}`;

  let skillHTML = '';
  if (scene.skillUsed && scene.skillUsed.combo) {
    const logsHTML = scene.skillUsed.logs.map(l => `
      <div class="log-line">
        <span class="log-slash">//</span>
        <span class="log-skill">${l.skill}</span>
        <span class="log-text">${l.desc}</span>
      </div>`).join('');
    skillHTML = `
      <div class="buff-banner" style="display:none" id="buff-${index}">
        <div class="buff-name">${scene.skillUsed.buff.name}</div>
        <div class="buff-desc">${scene.skillUsed.buff.desc}</div>
      </div>
      <div class="system-log-toggle" onclick="toggleLogs(${index})" id="toggle-${index}" style="display:none">
        <span class="arrow">▶</span><span>展开系统消息</span>
      </div>
      <div class="system-logs" id="logs-${index}">${logsHTML}</div>`;
  } else if (scene.skillUsed) {
    skillHTML = `
      <div class="buff-banner" style="display:none" id="buff-${index}">
        <div class="buff-name">技能激活：${scene.skillUsed.name}</div>
        <div class="buff-desc">${scene.skillUsed.desc}</div>
      </div>`;
  }

  const choicesHTML = scene.choices.map(c => `
    <button class="choice-btn" onclick="choose(${index}, '${c.key}')" id="btn-${index}-${c.key}">
      <span class="choice-key key-${c.key.toLowerCase()}">${c.key}</span>
      <span class="choice-text">${c.text}</span>
    </button>`).join('');

  wrap.innerHTML = `
    <div class="scene-header">
      <span class="scene-dot"></span>
      <span class="scene-chapter">${scene.chapter}</span>
      <span style="color:var(--border2)">·</span>
      <span class="scene-title">${scene.title}</span>
    </div>
    <div class="scene-body">
      <p class="narrator-text">${scene.narrative}</p>
      ${skillHTML}
    </div>
    <div class="choice-panel">
      <div class="choice-label">// 你的选择</div>
      <div class="choices">${choicesHTML}</div>
    </div>
    <div class="result-panel" id="result-${index}"></div>
  `;
  return wrap;
}

function choose(idx, key) {
  if (key === 'A') {
    pendingChoiceIdx = idx;
    pendingKey = key;
    showAlert(idx);
    return;
  }
  commitChoice(idx, key);
}

function showAlert(idx) {
  const scene = SCENES[idx];
  const projectedMoral = totalMoral + scene.moralDelta.A;
  const willAnnihilate = projectedMoral >= ANNIHILATION_THRESHOLD;

  document.getElementById('alert-title').textContent = willAnnihilate
    ? '⚠ 临界警告：抹杀倒计时'
    : '系统风险检测';

  document.getElementById('alert-body').textContent = scene.alertMsg;

  const bar = '█'.repeat(Math.min(10, Math.floor(projectedMoral / 6))) + '░'.repeat(Math.max(0, 10 - Math.floor(projectedMoral / 6)));
  document.getElementById('alert-moral-bar').innerHTML =
    `道德值预测：${totalMoral} → <strong style="color:var(--red2)">${projectedMoral}</strong> / ${ANNIHILATION_THRESHOLD}（抹杀阈值）<br>
    <span style="letter-spacing:2px;font-size:14px;">${bar}</span> ${willAnnihilate ? ' ← <strong>超标！</strong>' : ''}`;

  const overlay = document.getElementById('system-alert');
  overlay.style.display = 'flex';
}

function cancelAlert() {
  document.getElementById('system-alert').style.display = 'none';
  pendingChoiceIdx = -1;
  pendingKey = '';
}

function confirmAlert() {
  document.getElementById('system-alert').style.display = 'none';
  const idx = pendingChoiceIdx;
  pendingChoiceIdx = -1;
  pendingKey = '';

  const projectedMoral = totalMoral + SCENES[idx].moralDelta.A;
  if (projectedMoral >= ANNIHILATION_THRESHOLD) {
    triggerAnnihilation(idx);
  } else {
    commitChoice(idx, 'A');
  }
}

function triggerAnnihilation(idx) {
  annihilationCount++;
  const msg = ANNIHILATION_MSGS[(annihilationCount - 1) % ANNIHILATION_MSGS.length];
  document.getElementById('annihilation-text').textContent = msg;
  const overlay = document.getElementById('annihilation-overlay');
  overlay.style.display = 'flex';

  setTimeout(() => {
    overlay.style.display = 'none';
    rollbackScene(idx);
  }, 2200);
}

function rollbackScene(idx) {
  // Re-enable buttons on current scene
  const scene = SCENES[idx];
  scene.choices.forEach(c => {
    const btn = document.getElementById(`btn-${idx}-${c.key}`);
    if (btn) {
      btn.disabled = false;
      btn.classList.remove('selected-a', 'selected-b');
    }
  });
  // Hide result panel
  const resultEl = document.getElementById(`result-${idx}`);
  if (resultEl) {
    resultEl.classList.remove('visible');
    resultEl.innerHTML = '';
  }
  // Flash warning on scene
  const sceneEl = document.getElementById(`scene-${idx}`);
  if (sceneEl) {
    sceneEl.style.border = '1px solid var(--red)';
    sceneEl.style.boxShadow = '0 0 20px rgba(224,82,82,0.3)';
    setTimeout(() => {
      sceneEl.style.border = '';
      sceneEl.style.boxShadow = '';
    }, 1000);
    sceneEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  // Inject rollback notice
  const notice = document.createElement('div');
  notice.style.cssText = 'padding:8px 16px;background:rgba(224,82,82,0.1);border-top:1px solid rgba(224,82,82,0.2);font-size:12px;color:var(--red2);letter-spacing:1px;';
  notice.textContent = `// 已回档 · 第 ${annihilationCount} 次被抹杀 · 请重新选择`;
  const choicePanel = sceneEl.querySelector('.choice-panel');
  const existingNotice = sceneEl.querySelector('.rollback-notice');
  if (existingNotice) existingNotice.remove();
  notice.className = 'rollback-notice';
  choicePanel.insertBefore(notice, choicePanel.firstChild);
}

function commitChoice(idx, key) {
  const scene = SCENES[idx];
  const isB = key === 'B';
  const result = isB ? scene.resultB : scene.resultA;

  scene.choices.forEach(c => {
    const btn = document.getElementById(`btn-${idx}-${c.key}`);
    btn.disabled = true;
    if (c.key === key) btn.classList.add(`selected-${key.toLowerCase()}`);
  });

  const delta = isB ? scene.moralDelta.B : scene.moralDelta.A;
  totalMoral += delta;
  const moralEl = document.getElementById('moral-val');
  moralEl.textContent = totalMoral;
  moralEl.className = 'stat-value' + (totalMoral < 0 ? ' bad' : totalMoral >= 30 ? ' warn' : '');

  if (isB) bCount++;

  if (isB && document.getElementById(`buff-${idx}`)) {
    document.getElementById(`buff-${idx}`).style.cssText = 'display:flex;flex-direction:column;';
  }
  if (isB && document.getElementById(`toggle-${idx}`)) {
    document.getElementById(`toggle-${idx}`).style.display = 'flex';
  }

  const resultEl = document.getElementById(`result-${idx}`);
  const resultClass = result.type === 'good' ? 'result-good' : 'result-bad';
  const resultIcon = result.type === 'good' ? '✓' : '⚠';
  const isLast = idx === SCENES.length - 1;

  resultEl.innerHTML = `
    <div class="${resultClass}">
      <span class="result-icon">${resultIcon}</span>
      <span>${result.text.replace(/\n/g, '<br>')}</span>
    </div>
    ${!isLast
      ? `<button class="result-next-btn" onclick="nextScene(${idx})">继续 <span class="arrow">→</span></button>`
      : `<button class="result-next-btn" onclick="showEnding()">查看结局 <span class="arrow">→</span></button>`
    }
  `;
  resultEl.classList.add('visible');

  const done = idx + 1;
  document.getElementById('progress-fill').style.width = `${(done / SCENES.length) * 100}%`;
  document.getElementById('progress-count').textContent = `${done} / ${SCENES.length}`;
  document.getElementById('stage-val').textContent = `第 ${done} 关`;
}

function nextScene(currentIdx) {
  const nextIdx = currentIdx + 1;
  if (nextIdx >= SCENES.length) { showEnding(); return; }
  const container = document.getElementById('scenes-container');
  const next = buildScene(nextIdx);
  container.appendChild(next);
  setTimeout(() => next.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function toggleLogs(idx) {
  const logsEl = document.getElementById(`logs-${idx}`);
  const toggleEl = document.getElementById(`toggle-${idx}`);
  const isOpen = logsEl.classList.contains('visible');
  logsEl.classList.toggle('visible', !isOpen);
  toggleEl.classList.toggle('open', !isOpen);
}

function showEnding() {
  const state = { bCount, totalMoral, annihilationCount };
  const ending = ENDINGS.find(e => e.condition(state)) || ENDINGS[3];

  document.getElementById('end-title').textContent = ending.title;
  document.getElementById('end-choices').textContent = SCENES.length + annihilationCount;
  document.getElementById('end-b-count').textContent = bCount;
  document.getElementById('end-moral').textContent = totalMoral;

  // Build description
  let extraLines = '';
  if (annihilationCount > 0) {
    extraLines += `<br><br>途中共被系统抹杀 <strong style="color:var(--red2)">${annihilationCount}</strong> 次。`;
    if (annihilationCount >= 3) extraLines += '您的执念令系统服气。';
  }
  document.getElementById('end-desc').innerHTML = ending.desc + extraLines;

  // Achievements
  const achDiv = document.getElementById('end-achievements');
  achDiv.innerHTML = '';
  const mainAch = document.createElement('div');
  mainAch.style.cssText = 'background:rgba(230,184,74,0.1);border:1px solid rgba(230,184,74,0.35);border-radius:4px;padding:8px 14px;text-align:center;';
  mainAch.innerHTML = `<div style="color:var(--gold2);font-weight:600;font-size:13px;">${ending.achievement}</div><div style="color:var(--text3);font-size:11px;margin-top:3px;">${ending.achievementDesc}</div>`;
  achDiv.appendChild(mainAch);

  // Bonus achievements
  const bonuses = [];
  if (annihilationCount === 0) bonuses.push({ name: '【一命通关】', desc: '未触发任何抹杀' });
  if (annihilationCount >= 5) bonuses.push({ name: '【百折不挠】', desc: `被抹杀${annihilationCount}次仍不放弃` });
  if (bCount === 7) bonuses.push({ name: '【技能满配】', desc: '全程技能使用率100%' });
  if (totalMoral <= -80) bonuses.push({ name: '【道德黑洞】', desc: '道德值跌破-80' });
  if (totalMoral > 0) bonuses.push({ name: '【逆天改命】', desc: '最终道德值为正数' });

  bonuses.forEach(b => {
    const el = document.createElement('div');
    el.style.cssText = 'background:rgba(124,111,255,0.08);border:1px solid var(--border2);border-radius:4px;padding:6px 12px;text-align:center;';
    el.innerHTML = `<div style="color:var(--accent2);font-size:12px;">${b.name}</div><div style="color:var(--text3);font-size:10px;margin-top:2px;">${b.desc}</div>`;
    achDiv.appendChild(el);
  });

  const endScreen = document.getElementById('ending-screen');
  endScreen.classList.add('visible');
  setTimeout(() => endScreen.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function restartGame() {
  totalMoral = 0;
  bCount = 0;
  annihilationCount = 0;
  pendingChoiceIdx = -1;
  pendingKey = '';
  document.getElementById('moral-val').textContent = '0';
  document.getElementById('moral-val').className = 'stat-value';
  document.getElementById('stage-val').textContent = '第 1 关';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-count').textContent = '0 / ' + SCENES.length;
  document.getElementById('ending-screen').classList.remove('visible');
  document.getElementById('scenes-container').innerHTML = '';
  document.getElementById('system-alert').style.display = 'none';
  document.getElementById('annihilation-overlay').style.display = 'none';
  unlockSkills(4);
  init();
}

function unlockSkills(upTo) {
  document.querySelectorAll('.skill-badge').forEach((el, i) => {
    if (i <= upTo) el.classList.add('unlocked');
    else el.classList.remove('unlocked');
  });
}

function init() {
  const container = document.getElementById('scenes-container');
  container.innerHTML = '';
  container.appendChild(buildScene(0));
  unlockSkills(4);
}

init();
</script>
</body>
</html>
